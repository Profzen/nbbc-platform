<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NBBC Platform</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #38bdf8;
        animation: pulse 1.2s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { opacity: 0.25; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.25; transform: scale(0.85); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <div>NBBC Platform</div>
      <small>Initialisation de l'application...</small>
    </div>
  </body>
</html>
