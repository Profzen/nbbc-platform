name: Build Android Artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-36" || sdkmanager "platforms;android-35"
          sdkmanager "build-tools;36.0.0" || sdkmanager "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Android toolchain info
        run: |
          node -v
          npm -v
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          which sdkmanager || true
          sdkmanager --version || true

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build release APK and AAB
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease --stacktrace --no-daemon

      - name: Prepare release signing
        id: signing
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign release APK
        if: steps.signing.outputs.enabled == 'true'
        run: |
          APK_UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          APK_SIGNED="android/app/build/outputs/apk/release/app-release-signed.apk"

          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/zipalign" -f 4 "$APK_UNSIGNED" "$APK_ALIGNED"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks android/release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "$APK_SIGNED" \
            "$APK_ALIGNED"

      - name: Sign release AAB
        if: steps.signing.outputs.enabled == 'true'
        run: |
          jarsigner \
            -keystore android/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$ANDROID_KEY_ALIAS"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbbc-platform-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbbc-platform-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release-signed.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbbc-platform-release-aab
          path: |
            android/app/build/outputs/bundle/release/app-release-signed.aab
            android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
